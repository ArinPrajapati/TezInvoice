services:
  client:
    build: client
    ports:
     - 3000:3000
    volumes:
     - ./client:/app
    depends_on:
     - backend
  backend:
    build: server
    ports:
      - 4000:4000
    environment:
      - MONGODB_URI=mongodb://mongo:27017
      - PORT=4000
    depends_on:
      - mongo
  mongo:
    image: mongo
    ports:
      - 27017:27017
    volumes:
      - ./data:/data/db

volumes:
  data:
